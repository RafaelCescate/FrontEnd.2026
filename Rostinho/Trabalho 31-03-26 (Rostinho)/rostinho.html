<html>
    <head>
        <meta charset="UTF-8">
        <title>Meu Pet Virtual</title>
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> 
    </head>

 
        <div class="w-full flex items-center justify-start p-4 gap-4">

            <div class="avatar">
                <div class="w-16 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2">
                    <img src="feliz.png" />
                </div>
            </div>

            <input 
                type="text" 
                placeholder="Nome da criatura..." 
                class="input input-secondary"
            />

        </div> 
    <body style="
        background-image: url('cenarioNoite.png');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    ">
        <div class="flex flex-col items-center w-full px-4">

            <img 
                id="mainImage"
                src="normal.png"
                alt="Imagem principal"
                class="w-full max-w-md h-auto"
            />

    
        <div class="mt-12 flex justify-center w-full">

            <img 
                id="btnImage"
                src="pizza.png"
                alt="Botão"
                class="w-1/3 max-w-[180px] h-auto active:scale-95 transition"
                onclick="alimentar()"
            />

        </div>
    </body>

    <script src="script.js"></script>
</html>
